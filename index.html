<!DOCTYPE html>
<html lang="ar">
<head>
    <title>SENTINEL-X | THE BEAST STORE</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="red-mode">
    <nav class="cyber-nav">
        <div class="points-tag">BALANCE: <span id="pt">{{ points }}</span> PTS</div>
        <div class="lang-picker">
            <button onclick="setLang('ar')">AR</button>
            <button onclick="setLang('en')">EN</button>
            <button onclick="setLang('fr')">FR</button>
        </div>
    </nav>

    <div class="container">
        <h1 class="glitch" data-text="WXL_E ACADEMY">WXL_E ACADEMY</h1>
        
        <div class="gift-area">
            <button onclick="getGift()" id="giftBtn">🎁 DAILY REWARD</button>
        </div>

        <div class="grid">
            {% for tool in tools %}
            <div class="tool-card">
                <div class="status">ENCRYPTED</div>
                <h3>{{ tool.name }}</h3>
                <p>{{ tool.desc }}</p>
                <div class="cost">{{ tool.points }} PTS</div>
                <button class="buy-btn" onclick="buy('{{ tool.id }}')">GET SOURCE (.PY)</button>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function setTheme(color) { document.body.className = color + '-mode'; }
        
        function getGift() {
            // منطق إضافة النقاط (20 نقطة)
            alert("تم إضافة 20 نقطة لحسابك!");
        }

        function buy(id) {
            window.location.href = '/download/' + id;
        }
    </script>
</body>
</html>
